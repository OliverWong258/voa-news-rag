spring:
  application:
    name: voa-news-rag
  profiles:
    default: local
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      lettuce:
        pool:
          max-active: ${REDIS_POOL_MAX_ACTIVE:8}
  cloud:
    aws:
      region:
        static: ${AWS_REGION:us-east-1}
      sqs:
        listener:
          max-inflight-messages-per-queue: ${SQS_MAX_INFLIGHT_MESSAGES:10}
          max-messages-per-poll: ${SQS_MAX_MESSAGES_PER_POLL:10}
          poll-timeout: ${SQS_POLL_TIMEOUT:10s}

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

aws:
  region: ${AWS_REGION:us-east-1}
  sqs:
    crawl-queue: ${CRAWL_QUEUE:voa-crawl-queue}
    process-queue: ${PROCESS_QUEUE:article-process-queue}
    crawl-dlq: ${CRAWL_DLQ:voa-crawl-dlq}
    process-dlq: ${PROCESS_DLQ:article-process-dlq}
    index-queue: ${INDEX_QUEUE:article-index-queue}
    index-dlq: ${INDEX_DLQ:article-index-dlq}
    visibility-timeout-seconds: ${SQS_VISIBILITY_TIMEOUT_SECONDS:300}
    max-receive-count: ${SQS_MAX_RECEIVE_COUNT:5}
  s3:
    raw-content-bucket: ${RAW_CONTENT_BUCKET:voa-news-raw}

milvus:
  uri: ${MILVUS_URI:http://localhost:19530}
  token: ${MILVUS_TOKEN:}
  collection: ${MILVUS_COLLECTION:voa_news_chunks}
  embedding-dimension: ${EMBEDDING_DIMENSION:768}
  chunk-chars: ${RAG_CHUNK_CHARS:1200}
  chunk-overlap-chars: ${RAG_CHUNK_OVERLAP_CHARS:150}
  indexing-max-attempts: ${INDEXING_MAX_ATTEMPTS:5}
  default-top-k: ${RAG_DEFAULT_TOP_K:8}
  max-top-k: ${RAG_MAX_TOP_K:30}
  minimum-score: ${RAG_MINIMUM_SCORE:0.45}

llm:
  base-url: ${LLM_BASE_URL}
  api-key: ${LLM_API_KEY}
  chat-model: ${LLM_CHAT_MODEL}
  embedding-model: ${LLM_EMBEDDING_MODEL}
  request-timeout: ${LLM_REQUEST_TIMEOUT:60s}
  max-attempts: ${LLM_MAX_ATTEMPTS:3}
  translation-chunk-chars: ${LLM_TRANSLATION_CHUNK_CHARS:5000}
  summary-source-chars: ${LLM_SUMMARY_SOURCE_CHARS:12000}
  rag-max-context-chars: ${RAG_MAX_CONTEXT_CHARS:16000}

crawler:
  scheduler-enabled: ${CRAWLER_SCHEDULER_ENABLED:false}
  discovery-cron: ${CRAWLER_DISCOVERY_CRON:0 0/30 * * * *}
  max-links-per-run: ${CRAWLER_MAX_LINKS_PER_RUN:200}
  recovery-cron: ${CRAWLER_RECOVERY_CRON:0 */10 * * * *}
  stale-task-threshold: ${CRAWLER_STALE_TASK_THRESHOLD:15m}
  recovery-batch-size: ${CRAWLER_RECOVERY_BATCH_SIZE:100}
  seed-urls:
    - https://www.voanews.com/
    - https://www.voanews.com/usa
    - https://www.voanews.com/africa
    - https://www.voanews.com/east-asia-pacific
    - https://www.voanews.com/europe
    - https://www.voanews.com/middle-east
    - https://www.voanews.com/south-central-asia

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
