spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/voa_news?serverTimezone=UTC&useUnicode=true&characterEncoding=utf-8&createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  data:
    redis:
      host: ${REDIS_HOST:localhost}

llm:
  base-url: ${LLM_BASE_URL:http://localhost:11434}
  api-key: ${LLM_API_KEY:local-development}
  chat-model: ${LLM_CHAT_MODEL:qwen2.5:7b}
  embedding-model: ${LLM_EMBEDDING_MODEL:nomic-embed-text}

