spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
  cloud:
    aws:
      sqs:
        enabled: false
      region:
        static: us-east-1
      credentials:
        access-key: test
        secret-key: test

aws:
  region: us-east-1
  sqs:
    crawl-queue: test-crawl-queue
    process-queue: test-process-queue
    crawl-dlq: test-crawl-dlq
    process-dlq: test-process-dlq
    index-queue: test-index-queue
    index-dlq: test-index-dlq
    visibility-timeout-seconds: 300
    max-receive-count: 5
  s3:
    raw-content-bucket: test-raw-content

milvus:
  uri: http://localhost:19530
  collection: test_news_chunks
  embedding-dimension: 4
  chunk-chars: 100
  chunk-overlap-chars: 20
  indexing-max-attempts: 3
  default-top-k: 5
  max-top-k: 20
  minimum-score: 0.45

llm:
  base-url: http://localhost:11434
  api-key: test
  chat-model: test-chat
  embedding-model: test-embedding
  request-timeout: 5s
  max-attempts: 3
  translation-chunk-chars: 1000
  summary-source-chars: 2000
  rag-max-context-chars: 4000

crawler:
  scheduler-enabled: false
  discovery-cron: "0 0/30 * * * *"
  max-links-per-run: 20
  recovery-cron: "0 */10 * * * *"
  stale-task-threshold: 15m
  recovery-batch-size: 20
  seed-urls:
    - https://www.voanews.com/
